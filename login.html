<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiltiSmart Secure Access</title>
    <style>
        :root {
            --primary: #2196F3;
            --primary-dark: #1976D2;
            --bg: #f4f7f6;
            --text: #333;
            --error: #f44336;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .logo {
            margin-bottom: 20px;
        }
        .logo img {
            max-height: 50px;
            width: auto;
        }
        h1 { font-size: 18px; margin: 0 0 20px 0; color: #666; font-weight: 400; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; color: #999; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: var(--primary-dark);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #error-msg {
            color: var(--error);
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            line-height: 1.4;
            border: 1px solid #ffcdd2;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="https://piltismart.com/img/logo-new1.png" alt="PiltiSmart Logo">
        </div>
        <h1>Authenticate Securely</h1>
        
        <div id="error-msg"></div>

        <form id="login-form" novalidate>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="username" name="username" placeholder="name@domain.com" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        
        <div class="footer">
            &copy; 2026 PiltiSmart Solutions
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');
        const emailInput = document.getElementById('username');

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Login';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Robust Email Validation using Regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value)) {
                showError('Please enter a valid email address.');
                return;
            }

            // 2. UI State
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';

            const username = emailInput.value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/__auth__', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    const domain = window.location.hostname.split('.').slice(-2).join('.');
                    document.cookie = `gateway_token=${data.token}; domain=${domain}; path=/; max-age=86400; secure; samesite=lax`;
                    document.cookie = `gateway_user=${encodeURIComponent(username)}; domain=${domain}; path=/; max-age=86400; secure; samesite=lax`;
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectUrl = urlParams.get('redirect') || '/';
                    const separator = redirectUrl.includes('?') ? '&' : '?';
                    window.location.href = `${redirectUrl}${separator}token=${data.token}`;
                } else {
                    throw new Error('Unauthorized');
                }
            } catch (err) {
                showError('Login failed. Please try again.');
            }
        });
    </script>
</body>
</html>
