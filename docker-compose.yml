services:
  tb-ssh-bridge:
    build: .
    image: piltismartsolutions/tb-ssh-bridge:local
    container_name: piltismart-gateway
    network_mode: host
    environment:
      - TB_SERVER=${TB_SERVER:-https://tb.piltismart.com}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - BASE_DOMAIN=${BASE_DOMAIN:-piltismart.com}
      - CLUSTER_NAME=${CLUSTER_NAME:-proxmox-purple}
      - ADMIN_PORT=${ADMIN_PORT:-5000}
      - PROXY_PORT=${PROXY_PORT:-8080}
      - PVE_URL=${PVE_URL:-https://192.168.0.100:8006}
      - PVE_NODE=${PVE_NODE:-gold}
      - PVE_USER=${PVE_USER}
      - PVE_PASSWORD=${PVE_PASSWORD}
    env_file:
      - .env
    volumes:
      - ./gateway-data:/data
    restart: always
