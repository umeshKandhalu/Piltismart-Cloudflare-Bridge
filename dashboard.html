<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiltiSmart Gateway Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        * {
            box-sizing: border-box;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .sys-info {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .sys-stat {
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .search-box {
            position: relative;
            width: 350px;
        }

        .search-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            padding: 10px 16px 10px 40px;
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .search-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.85rem;
            border-radius: 8px;
        }
        
        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* Grouped View */
        .vmid-group {
            margin-bottom: 3rem;
        }

        .vmid-header {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .vmid-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--card-border);
        }

        .vmid-header-actions {
            display: flex;
            gap: 10px;
        }

        /* Table */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 1000px;
        }

        th {
            padding: 1rem 1.2rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--card-border);
            cursor: pointer;
            user-select: none;
            transition: color 0.2s, background 0.2s;
            position: relative;
            white-space: nowrap;
        }

        th:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        th.sort-asc::after { content: " ↑"; color: var(--accent); }
        th.sort-desc::after { content: " ↓"; color: var(--accent); }
        th.no-sort { cursor: default; }
        th.no-sort:hover { background: transparent; color: var(--text-muted); }
        th.no-sort::after { content: ""; }

        td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .card-url {
            color: var(--accent);
            text-decoration: none;
            opacity: 0.9;
            transition: opacity 0.2s;
            word-break: break-all;
        }
        
        .card-url:hover { opacity: 1; text-decoration: underline; }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-online { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-online::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-offline { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .status-offline::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }

        .target-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .date-tag {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .metric-value { font-family: monospace; font-size: 0.95rem; }
        .metric-unit { font-size: 0.8rem; color: var(--text-muted); font-family: 'Outfit', sans-serif; }
        
        .btn-icon {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-icon:hover { background: var(--danger); color: white; }
        .btn-icon svg { width: 16px; height: 16px; }

        /* Modal */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }

        .modal {
            background: #111827;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            padding: 0;
        }
        .modal-close:hover { color: white; }

        .modal h2 { margin-top: 0; margin-bottom: 1.5rem; font-weight: 500; text-align: center; }

        .input-group { position: relative; margin-bottom: 1.2rem; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .input-group input, .input-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            padding: 10px 14px;
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }
        
        .input-group select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 10px auto;
        }
        
        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        
        .form-row { display: flex; gap: 1rem; }
        .form-row > div { flex: 1; }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .checkbox-group input {
            width: auto;
            accent-color: var(--danger);
            transform: scale(1.2);
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            color: var(--text-muted);
            cursor: pointer;
        }

        .modal-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .modal-btn:hover { background: #2563eb; }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }

        .loader {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { opacity: 0; pointer-events: none; }
        .empty-state { text-align: center; padding: 4rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div id="auth-overlay" class="overlay">
        <div class="modal">
            <div class="logo-icon" style="margin: 0 auto 1.5rem auto; width: 48px; height: 48px;"></div>
            <h2>Gateway Authentication</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Log in using your ThingsBoard credentials.</p>
            <div class="error-msg" id="auth-error">Authentication failed</div>
            <div class="input-group">
                <input type="email" id="tb-username" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="tb-password" placeholder="Password" onkeydown="if(event.key === 'Enter') authenticate()" required>
            </div>
            <button class="modal-btn" onclick="authenticate()" id="auth-btn">Sign In</button>
        </div>
    </div>
    
    <div id="audit-overlay" class="overlay hidden">
        <div class="modal" style="max-width: 800px; max-height: 80vh; display: flex; flex-direction: column;">
            <button class="modal-close" onclick="closeAudit()">&times;</button>
            <h2>Audit Logs</h2>
            <div class="table-container" style="overflow-y: auto; flex: 1; border-radius: 8px;">
                <table>
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>User</th>
                            <th>Action</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="audit-logs-body">
                        <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="register-overlay" class="overlay hidden">
        <div class="modal">
            <button class="modal-close" onclick="closeRegister()">&times;</button>
            <h2>Register Service</h2>
            <div class="error-msg" id="reg-error">Failed to register</div>
            
            <form id="register-form" onsubmit="submitRegister(event)">
                <div class="input-group">
                    <label>Proxmox VMID</label>
                    <input type="number" id="reg-vmid" required placeholder="e.g. 101" onblur="autoDiscover()">
                </div>
                
                <div class="input-group">
                    <label>Hostname / Prefix</label>
                    <input type="text" id="reg-hostname" required placeholder="e.g. ollama">
                </div>
                
                <div class="input-group">
                    <label>Target Container IP</label>
                    <input type="text" id="reg-ip" required placeholder="e.g. 192.168.0.28">
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label>Port</label>
                        <input type="number" id="reg-port" required placeholder="80">
                    </div>
                    <div class="input-group">
                        <label>Access Mode</label>
                        <select id="reg-mode" required>
                            <option value="public">Public</option>
                            <option value="private">Private (Auth)</option>
                            <option value="tcp">TCP (Raw)</option>
                        </select>
                    </div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="reg-force">
                    <label for="reg-force">Force Overwrite (Warning: clears old routes for this VMID)</label>
                </div>
                
                <button type="submit" class="modal-btn" id="reg-btn">Register Route</button>
            </form>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>
                <div class="logo-icon"></div>
                PiltiSmart Gateway
            </h1>
            <div class="sys-info" id="sys-info">
                <div class="sys-stat">Connecting...</div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; color: var(--text-muted); font-size: 0.9rem;">
                <span id="user-greeting"></span>
                <button onclick="logout()" class="btn-primary btn-sm btn-danger" style="display: none;" id="logout-btn">Logout</button>
            </div>
        </header>

        <div class="controls-bar">
            <div class="search-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="search-input" placeholder="Search by hostname, target, mode..." onkeyup="renderDashboard()">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" style="background: rgba(255,255,255,0.1);" onclick="openAudit()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    Audit Logs
                </button>
                <button class="btn-primary" onclick="openRegister()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add Global Route
                </button>
            </div>
        </div>

        <div id="dashboard-content">
            <div class="empty-state">
                <div class="loader" style="width: 40px; height: 40px; border-width: 3px; margin-bottom: 1rem;"></div>
                <div>Fetching live metrics...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL_SERVICES = '/services';
        const API_URL_REGISTER = '/register';
        const API_URL_LOGIN = '/login';
        const API_URL_AUDIT = '/audit';
        let apiKey = localStorage.getItem('gateway_api_key');
        let gatewayUser = localStorage.getItem('gateway_user');
        let pollInterval;
        
        // Data State
        let cachedServices = [];
        let sortCol = 'createdAt';
        let sortAsc = false;

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0.00 <span class="metric-unit">B</span>';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} <span class="metric-unit">${sizes[i]}</span>`;
        }

        function getStatusBadge(status) {
            if (status === 'online') return `<span class="status-badge status-online">Online</span>`;
            if (status === 'offline') return `<span class="status-badge status-offline">Offline</span>`;
            return `<span class="status-badge status-pending">Pending</span>`;
        }
        
        function formatDate(isoString) {
            if (!isoString) return '--';
            const d = new Date(isoString);
            return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute:'2-digit' });
        }

        async function authenticate() {
            const username = document.getElementById('tb-username').value;
            const password = document.getElementById('tb-password').value;
            const btn = document.getElementById('auth-btn');
            if (!username || !password) return;
            
            btn.innerHTML = '<div class="loader"></div>';
            
            try {
                const res = await fetch(API_URL_LOGIN, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('gateway_api_key', data.token);
                    localStorage.setItem('gateway_user', data.user);
                    apiKey = data.token;
                    gatewayUser = data.user;
                    
                    document.getElementById('auth-overlay').classList.add('hidden');
                    startPolling();
                } else {
                    const err = await res.json();
                    document.getElementById('auth-error').innerText = err.error || 'Authentication failed';
                    document.getElementById('auth-error').style.display = 'block';
                    btn.innerHTML = 'Sign In';
                }
            } catch (e) {
                document.getElementById('auth-error').innerText = 'Connection failed';
                document.getElementById('auth-error').style.display = 'block';
                btn.innerHTML = 'Sign In';
            }
        }
        
        function logout() {
            localStorage.removeItem('gateway_api_key');
            localStorage.removeItem('gateway_user');
            apiKey = null;
            gatewayUser = null;
            clearInterval(pollInterval);
            document.getElementById('auth-overlay').classList.remove('hidden');
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('user-greeting').innerText = '';
        }
        
        function openRegister(vmid = '') { 
            document.getElementById('register-overlay').classList.remove('hidden');
            if (vmid) {
                document.getElementById('reg-vmid').value = vmid;
                autoDiscover();
            }
        }
        
        function closeRegister() { 
            document.getElementById('register-overlay').classList.add('hidden');
            document.getElementById('reg-error').style.display = 'none';
            document.getElementById('register-form').reset();
        }
        
        async function openAudit() {
            document.getElementById('audit-overlay').classList.remove('hidden');
            document.getElementById('audit-logs-body').innerHTML = '<tr><td colspan="4" class="empty-state"><div class="loader"></div></td></tr>';
            
            if (!apiKey) return;
            try {
                const res = await fetch(API_URL_AUDIT, { headers: { 'x-api-key': apiKey } });
                if (res.ok) {
                    const logs = await res.json();
                    renderAuditLogs(logs);
                } else {
                    document.getElementById('audit-logs-body').innerHTML = '<tr><td colspan="4" class="empty-state">Failed to load logs</td></tr>';
                }
            } catch (e) {
                document.getElementById('audit-logs-body').innerHTML = '<tr><td colspan="4" class="empty-state">Connection error</td></tr>';
            }
        }
        
        function closeAudit() {
            document.getElementById('audit-overlay').classList.add('hidden');
        }
        
        function renderAuditLogs(logs) {
            const tbody = document.getElementById('audit-logs-body');
            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No audit logs found.</td></tr>';
                return;
            }
            
            let html = '';
            for (const log of logs) {
                html += `
                    <tr>
                        <td class="date-tag">${formatDate(log.timestamp)}</td>
                        <td><b>${log.user}</b></td>
                        <td><span class="target-tag">${log.action}</span></td>
                        <td>${log.details}</td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }
        
        async function autoDiscover() {
            const vmid = document.getElementById('reg-vmid').value;
            if (!vmid || !apiKey) return;
            
            const hostInput = document.getElementById('reg-hostname');
            const ipInput = document.getElementById('reg-ip');
            
            try {
                const res = await fetch(`/discover/${vmid}`, { headers: { 'x-api-key': apiKey } });
                if (res.ok) {
                    const details = await res.json();
                    hostInput.value = details.hostname;
                    ipInput.value = details.ip;
                }
            } catch(e) {
                console.error("Auto discover failed");
            }
        }
        
        async function submitRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            const ogText = btn.innerText;
            btn.innerHTML = '<div class="loader"></div>';
            
            const payload = {
                vmid: parseInt(document.getElementById('reg-vmid').value),
                hostname: document.getElementById('reg-hostname').value,
                ip: document.getElementById('reg-ip').value,
                force: document.getElementById('reg-force').checked,
                expose: [{
                    port: parseInt(document.getElementById('reg-port').value),
                    mode: document.getElementById('reg-mode').value
                }]
            };
            
            try {
                const res = await fetch(API_URL_REGISTER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    closeRegister();
                    fetchMetrics(); // instant refresh
                } else {
                    const err = await res.json();
                    document.getElementById('reg-error').innerText = err.error || 'Failed to register';
                    document.getElementById('reg-error').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('reg-error').innerText = 'Connection error';
                document.getElementById('reg-error').style.display = 'block';
            }
            btn.innerHTML = ogText;
        }
        
        async function deleteService(vmid, port, mode) {
            if (!confirm(`Are you sure you want to delete this route? (VMID ${vmid}, Port ${port})`)) return;
            try {
                const res = await fetch(API_URL_SERVICES, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
                    body: JSON.stringify({ vmid: parseInt(vmid), port: parseInt(port), mode: mode })
                });
                if (res.ok) fetchMetrics();
                else alert("Failed to delete service.");
            } catch (e) { alert("Connection error."); }
        }
        
        async function deleteContainer(vmid) {
            if (!confirm(`⚠️ DANGER: Are you sure you want to completely wipe ALL routes for VMID ${vmid}?`)) return;
            try {
                const res = await fetch(API_URL_SERVICES, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
                    body: JSON.stringify({ vmid: parseInt(vmid) })
                });
                if (res.ok) fetchMetrics();
                else alert("Failed to delete container routes.");
            } catch (e) { alert("Connection error."); }
        }

        async function fetchMetrics() {
            if (!apiKey) return;
            try {
                const res = await fetch(API_URL_SERVICES, { headers: { 'x-api-key': apiKey } });
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('gateway_api_key');
                    localStorage.removeItem('gateway_user');
                    apiKey = null;
                    gatewayUser = null;
                    document.getElementById('logout-btn').style.display = 'none';
                    document.getElementById('user-greeting').innerText = '';
                    document.getElementById('auth-overlay').classList.remove('hidden');
                    clearInterval(pollInterval);
                    return;
                }
                const data = await res.json();
                processData(data);
            } catch (e) {
                console.error("Failed to fetch metrics", e);
            }
        }

        function processData(data) {
            document.getElementById('sys-info').innerHTML = `
                <div class="sys-stat"><span style="color: var(--success); font-weight: bold;">●</span> Tunnel: ${data.tunnel_id || 'Active'}</div>
                <div class="sys-stat">Updated: ${new Date().toLocaleTimeString()}</div>
            `;

            let flattened = [];
            for (const [vmid, services] of Object.entries(data.services)) {
                for (const svc of services) {
                    const portStr = svc.target.split(':')[1];
                    flattened.push({
                        ...svc,
                        vmid: parseInt(vmid),
                        port: parseInt(portStr),
                        requests: svc.metrics ? svc.metrics.requests : 0,
                        bytesRx: svc.metrics ? svc.metrics.bytesRx : 0,
                        bytesTx: svc.metrics ? svc.metrics.bytesTx : 0
                    });
                }
            }
            cachedServices = flattened;
            renderDashboard();
        }

        function setSort(col) {
            if (sortCol === col) {
                sortAsc = !sortAsc;
            } else {
                sortCol = col;
                sortAsc = true;
            }
            renderDashboard();
        }

        function getSortClass(col) {
            if (sortCol === col) return sortAsc ? 'sort-asc' : 'sort-desc';
            return '';
        }

        function renderDashboard() {
            const content = document.getElementById('dashboard-content');
            if (cachedServices.length === 0) {
                content.innerHTML = `<div class="empty-state">No services registered on this gateway yet.</div>`;
                return;
            }

            const query = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = cachedServices.filter(svc => {
                return String(svc.vmid).includes(query) || 
                       svc.hostname.toLowerCase().includes(query) ||
                       svc.target.toLowerCase().includes(query) ||
                       svc.mode.toLowerCase().includes(query) ||
                       svc.status.toLowerCase().includes(query);
            });

            filtered.sort((a, b) => {
                let valA = a[sortCol];
                let valB = b[sortCol];
                
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            
            // Group by VMID
            const grouped = {};
            for (const svc of filtered) {
                if (!grouped[svc.vmid]) grouped[svc.vmid] = [];
                grouped[svc.vmid].push(svc);
            }

            let html = '';
            
            // Render each VMID group
            const vmidKeys = Object.keys(grouped).sort((a, b) => parseInt(a) - parseInt(b));
            
            for (const vmid of vmidKeys) {
                const svcs = grouped[vmid];
                
                html += `
                    <div class="vmid-group">
                        <div class="vmid-header">
                            <span>LXC Container: <b>VMID ${vmid}</b></span>
                            <div class="vmid-header-actions">
                                <button class="btn-primary btn-sm" onclick="openRegister(${vmid})">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                    Add Route
                                </button>
                                <button class="btn-primary btn-sm btn-danger" onclick="deleteContainer(${vmid})" title="Wipe all routes for this container">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    Delete All
                                </button>
                            </div>
                        </div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th onclick="setSort('status')" class="${getSortClass('status')}">Status</th>
                                        <th onclick="setSort('hostname')" class="${getSortClass('hostname')}">Hostname</th>
                                        <th onclick="setSort('target')" class="${getSortClass('target')}">Target</th>
                                        <th onclick="setSort('mode')" class="${getSortClass('mode')}">Mode</th>
                                        <th onclick="setSort('latency')" class="${getSortClass('latency')}">Latency</th>
                                        <th onclick="setSort('requests')" class="${getSortClass('requests')}">Requests</th>
                                        <th onclick="setSort('bytesTx')" class="${getSortClass('bytesTx')}">Data Tx</th>
                                        <th onclick="setSort('createdAt')" class="${getSortClass('createdAt')}">Date Added</th>
                                        <th class="no-sort" style="width:60px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;

                for (const svc of svcs) {
                    const latencyStr = svc.latency > -1 ? `${svc.latency} <span class="metric-unit">ms</span>` : '--';
                    
                    html += `
                        <tr>
                            <td>${getStatusBadge(svc.status)}</td>
                            <td><a href="${svc.url}" target="_blank" class="card-url">${svc.hostname}</a></td>
                            <td><span class="target-tag">${svc.target}</span></td>
                            <td style="text-transform: capitalize;">${svc.mode}</td>
                            <td class="metric-value">${latencyStr}</td>
                            <td class="metric-value">${svc.requests.toLocaleString()}</td>
                            <td class="metric-value">${formatBytes(svc.bytesTx)}</td>
                            <td class="date-tag">${formatDate(svc.createdAt)}</td>
                            <td>
                                <button class="btn-icon" onclick="deleteService(${svc.vmid}, ${svc.port}, '${svc.mode}')" title="Delete Route">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </td>
                        </tr>
                    `;
                }

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            
            content.innerHTML = html;
        }

        function startPolling() {
            if (gatewayUser) {
                document.getElementById('user-greeting').innerText = `Logged in as ${gatewayUser}`;
                document.getElementById('logout-btn').style.display = 'inline-block';
            }
            fetchMetrics();
            pollInterval = setInterval(fetchMetrics, 5000);
        }

        if (apiKey) {
            document.getElementById('auth-overlay').classList.add('hidden');
            startPolling();
        }
    </script>
</body>
</html>
